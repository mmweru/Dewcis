services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB:       archivedb
      POSTGRES_USER:     archiveuser
      POSTGRES_PASSWORD: archivepass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archiveuser -d archivedb"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@dewcis.com
      PGADMIN_DEFAULT_PASSWORD: adminpass
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  testenv:
    image: debian:bookworm-slim
    command: >
      sh -c "bash /workspace/setup.sh && touch /tmp/.setup_done && tail -f /dev/null"
    volumes:
      - ./:/workspace
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: archivedb
      DB_USER: archiveuser
      DB_PASS: archivepass
      ARCHIVE_DIR: /tmp/archive
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/.setup_done"]
      interval: 5s
      timeout: 5s
      retries: 30

  api:
    image: python:3.11-slim
    command: >
      sh -c "pip install -r /workspace/requirements.txt -q &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./:/workspace
    working_dir: /workspace
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: archivedb
      DB_USER: archiveuser
      DB_PASS: archivepass
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/stats')\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  test-runner:
    profiles: [test]
    image: python:3.11-slim
    command: >
      sh -c "
        apt-get update -qq &&
        apt-get install -y -qq docker.io &&
        pip install -r /workspace/requirements.txt -q &&
        pytest /workspace/test_archive.py -v --tb=short
      "
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
      testenv:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: archivedb
      DB_USER: archiveuser
      DB_PASS: archivepass
      ARCHIVE_DIR: /tmp/archive
      API_URL: http://api:8000

volumes:
  pgdata: